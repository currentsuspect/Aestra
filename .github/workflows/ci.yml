name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    name: Linux (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev libgl1-mesa-dev libx11-dev

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DAESTRA_HEADLESS_ONLY=ON -DAESTRA_ENABLE_UI=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure -R "CommandHistoryTest|MoveClipCommandTest|MacroCommandTest|AestraOscillatorTest|AestraMixerBusTest|AestraAtomicSaveTest"

      - name: Discord Notification
        if: always() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          COLOR=3066993; [ "$STATUS" != "success" ] && COLOR=15158332
          curl -s -o /dev/null -w "%{http_code}" -H "Content-Type: application/json" -d "{
            \"username\": \"Aestra CI\",
            \"embeds\": [{
              \"title\": \"CI — Linux: $STATUS\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": $COLOR,
              \"footer\": {\"text\": \"${{ github.event.head_commit.message }}\" }
            }]
          }" "$DISCORD_WEBHOOK"

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DAESTRA_HEADLESS_ONLY=ON -DAESTRA_ENABLE_UI=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: build
        shell: bash
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure -R "CommandHistoryTest|MoveClipCommandTest|MacroCommandTest|AestraOscillatorTest|AestraMixerBusTest|AestraAtomicSaveTest"

      - name: Discord Notification
        if: always() && env.DISCORD_WEBHOOK != ''
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          COLOR=3066993; [ "$STATUS" != "success" ] && COLOR=15158332
          curl -s -o /dev/null -w "%{http_code}" -H "Content-Type: application/json" -d "{
            \"username\": \"Aestra CI\",
            \"embeds\": [{
              \"title\": \"CI — Windows: $STATUS\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": $COLOR,
              \"footer\": {\"text\": \"${{ github.event.head_commit.message }}\" }
            }]
          }" "$DISCORD_WEBHOOK"

  build-macos:
    name: macOS (Clang)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DAESTRA_HEADLESS_ONLY=ON -DAESTRA_ENABLE_UI=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure -R "CommandHistoryTest|MoveClipCommandTest|MacroCommandTest|AestraOscillatorTest|AestraMixerBusTest|AestraAtomicSaveTest"

      - name: Discord Notification
        if: always() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          COLOR=3066993; [ "$STATUS" != "success" ] && COLOR=15158332
          curl -s -o /dev/null -w "%{http_code}" -H "Content-Type: application/json" -d "{
            \"username\": \"Aestra CI\",
            \"embeds\": [{
              \"title\": \"CI — macOS: $STATUS\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": $COLOR,
              \"footer\": {\"text\": \"${{ github.event.head_commit.message }}\" }
            }]
          }" "$DISCORD_WEBHOOK"

  format-check:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-14 100

      - name: Check Formatting
        run: |
          FILES=$(find AestraAudio AestraCore AestraPlat Tests -name "*.cpp" -o -name "*.hpp" -o -name "*.h" | grep -v External/)
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs clang-format --dry-run --Werror 2>&1 | head -100
          fi
        continue-on-error: true

  static-analysis:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-14 clang-format-14

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DAESTRA_ENABLE_UI=OFF -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          clang-tidy-14 --config-file=.clang-tidy \
            AestraCore/src/*.cpp \
            -- -IAestraCore/include -std=c++17 2>&1 | head -100 || true
        continue-on-error: true
