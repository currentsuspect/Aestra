name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DAESTRA_ENABLE_UI=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Discord Notification
        if: always()
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          COLOR=3066993; [ "$STATUS" != "success" ] && COLOR=15158332
          curl -s -o /dev/null -w "%{http_code}" -H "Content-Type: application/json" -d "{
            \"username\": \"Aestra CI\",
            \"embeds\": [{
              \"title\": \"CI — Windows: $STATUS\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": $COLOR,
              \"footer\": {\"text\": \"${{ github.event.head_commit.message }}\" }
            }]
          }" "${{ secrets.DISCORD_WEBHOOK }}"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev libgl1-mesa-dev libx11-dev

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DAESTRA_ENABLE_UI=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Discord Notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=3066993; [ "$STATUS" != "success" ] && COLOR=15158332
          curl -s -o /dev/null -w "%{http_code}" -H "Content-Type: application/json" -d "{
            \"username\": \"Aestra CI\",
            \"embeds\": [{
              \"title\": \"CI — Linux: $STATUS\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": $COLOR,
              \"footer\": {\"text\": \"${{ github.event.head_commit.message }}\" }
            }]
          }" "${{ secrets.DISCORD_WEBHOOK }}"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DAESTRA_ENABLE_UI=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Discord Notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=3066993; [ "$STATUS" != "success" ] && COLOR=15158332
          curl -s -o /dev/null -w "%{http_code}" -H "Content-Type: application/json" -d "{
            \"username\": \"Aestra CI\",
            \"embeds\": [{
              \"title\": \"CI — macOS: $STATUS\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": $COLOR,
              \"footer\": {\"text\": \"${{ github.event.head_commit.message }}\" }
            }]
          }" "${{ secrets.DISCORD_WEBHOOK }}"

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-14 100

      - name: Check Formatting
        run: |
          find AestraAudio AestraCore AestraPlat Tests \
            -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \
            | grep -v External/ \
            | xargs clang-format --dry-run --Werror
